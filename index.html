<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock, Paper, Scissors - Neon UI</title>
<style>
  :root {
    --window-bg: #1a1b26;
    --box-bg: #2e2e3a;
    --win-color: #00FF7F;
    --lose-color: #ff355e;
    --tie-color: #00e5ff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--window-bg);
    font-family: Arial, sans-serif;
  }

  .game {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 40px 20px;
  }

  #score {
    font-family: "Segoe UI", sans-serif;
    font-size: 20px;
    font-weight: bold;
    color: #f1f1f1;
    margin: 20px 0 5px;
  }

  #roundsPlayed {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #888899;
    margin-bottom: 15px;
  }

  #emojiBox {
    background: var(--box-bg);
    border: 8px ridge #4a4a5a;
    border-radius: 6px;
    width: 420px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    color: #fff;
    text-align: center;
    padding: 10px;
  }

  #names {
    background: var(--box-bg);
    color: #aaaaaa;
    font-size: 14px;
    width: 420px;
    padding: 6px 20px 12px;
    text-align: left;
    white-space: pre;
    font-family: "Courier New", monospace;
  }

  #result {
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-style: italic;
    color: #ffffff;
    min-height: 26px;
    margin: 15px 0 20px;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .move-btn {
    font-family: "Segoe UI", sans-serif;
    font-size: 20px;
    font-weight: bold;
    width: 150px;
    padding: 15px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    color: #000;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  .move-btn:hover { filter: brightness(1.15); }
  .move-btn:active { transform: scale(0.96); }
  .move-btn:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

  #rockBtn { background: #00ff7f; }
  #paperBtn { background: #00e5ff; }
  #scissorsBtn { background: #ffe600; }

  .bottom-row {
    display: flex;
    gap: 10px;
  }

  #quitBtn {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    background: #333333;
    color: #ffffff;
    width: 110px;
    padding: 10px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  #quitBtn:hover { background: #444444; color: #ff5555; }

  #muteBtn {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    background: #333333;
    color: #ffffff;
    width: 130px;
    padding: 10px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  #muteBtn:hover { background: #444444; }

  .hidden { display: none; }

  #gameOverMsg {
    color: #aaaaaa;
    font-family: "Segoe UI", sans-serif;
    font-size: 16px;
    text-align: center;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="game" id="gameRoot">
  <div id="score">Score: You 0  |  Computer 0  |  Ties 0</div>
  <div id="roundsPlayed">Games played this session: 0</div>

  <div id="emojiBox"></div>
  <div id="names">Make your move!</div>

  <div id="result"></div>

  <div class="buttons">
    <button class="move-btn" id="rockBtn">🪨  Rock</button>
    <button class="move-btn" id="paperBtn">📄  Paper</button>
    <button class="move-btn" id="scissorsBtn">✂️  Scissors</button>
  </div>

  <div class="bottom-row">
    <button id="muteBtn">🔊 Sound On</button>
    <button id="quitBtn">Quit</button>
  </div>
</div>

<div id="gameOverMsg" class="hidden">Thanks for playing! Refresh the page to play again.</div>

<script>
  // ---- Sound effects (synthesized, no external files needed) ----
  let soundEnabled = true;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playTone(freq, duration, type = "sine", startGain = 0.15) {
    if (!soundEnabled) return;
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  }

  function playClickSound() {
    playTone(440, 0.08, "square", 0.08);
  }

  function playWinSound() {
    playTone(523.25, 0.12, "sine");
    setTimeout(() => playTone(659.25, 0.12, "sine"), 100);
    setTimeout(() => playTone(783.99, 0.2, "sine"), 200);
  }

  function playLoseSound() {
    playTone(300, 0.15, "sawtooth", 0.1);
    setTimeout(() => playTone(220, 0.25, "sawtooth", 0.1), 130);
  }

  function playTieSound() {
    playTone(392, 0.1, "triangle");
    setTimeout(() => playTone(392, 0.15, "triangle"), 120);
  }

  const moves = ["rock", "paper", "scissors"];
  const emojis = { rock: "🪨", paper: "📄", scissors: "✂️" };

  let userScore = 0;
  let computerScore = 0;
  let tieCount = 0;
  let roundsPlayed = 0;

  const scoreEl = document.getElementById("score");
  const roundsEl = document.getElementById("roundsPlayed");
  const emojiBox = document.getElementById("emojiBox");
  const namesEl = document.getElementById("names");
  const resultEl = document.getElementById("result");

  function play(userChoice) {
    playClickSound();
    const computerChoice = moves[Math.floor(Math.random() * moves.length)];

    roundsPlayed++;
    roundsEl.textContent = `Games played this session: ${roundsPlayed}`;

    emojiBox.textContent = `${emojis[userChoice]}   VS   ${emojis[computerChoice]}`;

    const you = "You".padEnd(15, " ");
    const comp = "Computer";
    const line1 = you + comp;
    const line2 = capitalize(userChoice).padEnd(15, " ") + capitalize(computerChoice).padStart(10, " ");
    namesEl.textContent = line1 + "\n" + line2;

    if (userChoice === computerChoice) {
      resultEl.textContent = "It's a Tie!";
      resultEl.style.color = "var(--tie-color)";
      tieCount++;
      playTieSound();
    } else if (
      (userChoice === "rock" && computerChoice === "scissors") ||
      (userChoice === "paper" && computerChoice === "rock") ||
      (userChoice === "scissors" && computerChoice === "paper")
    ) {
      userScore++;
      resultEl.textContent = "You Win! 🎉";
      resultEl.style.color = "var(--win-color)";
      playWinSound();
    } else {
      computerScore++;
      resultEl.textContent = "Computer Wins! 💻";
      resultEl.style.color = "var(--lose-color)";
      playLoseSound();
    }

    scoreEl.textContent = `Score: You ${userScore}  |  Computer ${computerScore}  |  Ties ${tieCount}`;
  }

  function capitalize(word) {
    return word.charAt(0).toUpperCase() + word.slice(1);
  }

  document.getElementById("rockBtn").addEventListener("click", () => play("rock"));
  document.getElementById("paperBtn").addEventListener("click", () => play("paper"));
  document.getElementById("scissorsBtn").addEventListener("click", () => play("scissors"));

  document.getElementById("muteBtn").addEventListener("click", () => {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById("muteBtn");
    btn.textContent = soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";
  });

  document.getElementById("quitBtn").addEventListener("click", () => {
    document.getElementById("gameRoot").classList.add("hidden");
    document.getElementById("gameOverMsg").classList.remove("hidden");
  });
</script>

</body>
</html>
